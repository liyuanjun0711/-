<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f6f8">
  <meta name="description" content="个人持仓行情、风险提醒与市场信息仪表盘">
  <title>持仓仪表盘</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">LY</div>
        <div>
          <p class="eyebrow">PORTFOLIO WORKSPACE</p>
          <h1>持仓仪表盘</h1>
        </div>
      </div>
      <button class="refresh-button" id="refreshAll" type="button" data-action="refresh-all">
        <span class="refresh-icon" aria-hidden="true">↻</span>
        <span class="refresh-label">刷新数据</span>
      </button>
    </header>

    <section class="data-bar" aria-label="数据状态">
      <div class="data-state">
        <span class="status-dot" id="statusDot" aria-hidden="true"></span>
        <div>
          <strong id="dataStatus">正在读取本地缓存</strong>
          <small id="dataTimestamp">尚未完成数据校验</small>
        </div>
      </div>
      <div class="data-meta">
        <span id="marketStatus">市场状态待确认</span>
        <span id="baselineStatus">策略基线待读取</span>
      </div>
    </section>

    <nav class="tabbar" aria-label="页面导航">
      <button type="button" data-view="overview" class="active">总览</button>
      <button type="button" data-view="market">行情</button>
      <button type="button" data-view="news">消息</button>
      <button type="button" data-view="notes">复盘</button>
    </nav>

    <main id="appRoot" class="app-main" aria-live="polite">
      <section class="loading-card">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line short"></div>
      </section>
    </main>

    <footer class="app-footer">
      行情用于个人观察与复盘。实际交易以前台券商价格、可用资金和成交确认为准。
    </footer>
  </div>

  <div id="detailRoot"></div>
  <div id="toastRoot" aria-live="assertive"></div>

  <script src="./vendor/lightweight-charts.standalone.production.js"></script>
  <script src="./report-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
