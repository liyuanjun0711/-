<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f6f7f9">
  <meta name="description" content="个人持仓行情、K线和规则评分工作台">
  <title>持仓工作台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="workspace-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-kicker">PORTFOLIO</span>
        <strong>持仓工作台</strong>
        <small>行情、K线、风险</small>
      </div>

      <nav class="tabbar" aria-label="页面导航">
        <button type="button" data-view="overview" class="active"><span>总览</span><small>Portfolio</small></button>
        <button type="button" data-view="market"><span>行情</span><small>Market</small></button>
        <button type="button" data-view="news"><span>消息</span><small>News</small></button>
        <button type="button" data-view="notes"><span>方法</span><small>Rules</small></button>
      </nav>

      <div class="sidebar-foot">
        <span>复盘用，不自动交易</span>
        <small>真实行情和规则评分分开显示</small>
      </div>
    </aside>

    <div class="workspace-main">
      <header class="commandbar">
        <div class="page-heading">
          <p class="eyebrow">MARKET WORKBENCH</p>
          <h1>持仓与风险</h1>
        </div>
        <button class="refresh-button" id="refreshAll" type="button" data-action="refresh-all">
          <span class="refresh-icon" aria-hidden="true">↻</span>
          <span class="refresh-label">刷新数据</span>
        </button>
      </header>

      <section class="provenance-bar" aria-label="数据状态">
        <div class="data-state">
          <span class="status-dot" id="statusDot" aria-hidden="true"></span>
          <div>
            <strong id="dataStatus">正在读取缓存</strong>
            <small id="dataTimestamp">稍后校验最新行情</small>
          </div>
        </div>
        <div class="provenance-meta">
          <span id="marketStatus">市场状态待确认</span>
          <span id="snapshotStatus">快照待生成</span>
          <span id="scoreStatus">评分待加载</span>
          <span id="baselineStatus">组合待读取</span>
        </div>
      </section>

      <main id="appRoot" class="app-main" aria-live="polite">
        <section class="loading-card">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line short"></div>
        </section>
      </main>

      <footer class="app-footer">行情来自公开数据源；评分为本地规则，仅供复盘。</footer>
    </div>
  </div>

  <div id="detailRoot"></div>
  <div id="toastRoot" aria-live="assertive"></div>

  <script src="./vendor/lightweight-charts.standalone.production.js"></script>
  <script src="./report-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
