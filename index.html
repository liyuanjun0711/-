<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日持仓晨报</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Morning Brief</p>
      <h1>每日持仓晨报</h1>
      <p class="subline">先看买卖动作，再看市场逻辑和持仓走势。</p>
    </div>
    <div class="status">
      <span id="reportDate">--</span>
      <span id="reportTime">--</span>
      <span id="liveQuoteStatus">行情未刷新</span>
      <button class="refresh-btn" id="refreshQuotes" type="button">刷新行情</button>
    </div>
  </header>

  <nav class="segment" aria-label="页面导航">
    <button data-target="decisionSection" class="active">操作</button>
    <button data-target="outlookSection">走势</button>
    <button data-target="newsSection">新闻</button>
    <button data-target="logicSection">逻辑</button>
  </nav>

  <main class="layout">
    <section class="hero">
      <div>
        <p class="section-label">今日一句话</p>
        <h2 id="oneLine">等待数据更新</h2>
      </div>
      <div class="hero-metrics" id="heroMetrics"></div>
    </section>

    <section class="band priority-band" id="decisionSection">
      <div class="section-head">
        <div>
          <p class="section-label">先看这里</p>
          <h2>今天到底买卖什么</h2>
        </div>
      </div>
      <div class="decision-grid" id="decisionGrid"></div>
    </section>

    <section class="band">
      <div class="section-head">
        <div>
          <p class="section-label">执行表</p>
          <h2>今日买卖清单</h2>
        </div>
      </div>
      <div class="action-list" id="actionRows"></div>
    </section>

    <section class="band" id="outlookSection">
      <div class="section-head">
        <div>
          <p class="section-label">持仓判断</p>
          <h2>持仓今日走势预期</h2>
        </div>
      </div>
      <div class="outlook-grid" id="outlookGrid"></div>
    </section>

    <section class="split">
      <section class="band">
        <div class="section-head">
          <div>
            <p class="section-label">风险</p>
            <h2>我的持仓风险</h2>
          </div>
        </div>
        <div class="risk-grid" id="riskGrid"></div>
      </section>

      <section class="band">
        <div class="section-head">
          <div>
            <p class="section-label">观察</p>
            <h2>可关注但暂不一定买</h2>
          </div>
        </div>
        <ul class="watch-list" id="watchList"></ul>
      </section>
    </section>

    <section class="band">
      <div class="section-head">
        <div>
          <p class="section-label">盘中应对</p>
          <h2>三套交易剧本</h2>
        </div>
      </div>
      <div class="scenario-grid" id="scenarioGrid"></div>
    </section>

    <section class="band" id="newsSection">
      <div class="section-head">
        <div>
          <p class="section-label">市场雷达</p>
          <h2>全市场重大利好/风险</h2>
        </div>
      </div>
      <div class="news-list" id="newsList"></div>
    </section>

    <section class="band">
      <div class="section-head">
        <div>
          <p class="section-label">24h</p>
          <h2>过去24小时热点复盘</h2>
        </div>
      </div>
      <div class="timeline" id="timelineList"></div>
    </section>

    <section class="band" id="logicSection">
      <div class="section-head">
        <div>
          <p class="section-label">为什么</p>
          <h2>逐项说明</h2>
        </div>
      </div>
      <div class="explain-list" id="explainList"></div>
    </section>

    <section class="split">
      <section class="band">
        <div class="section-head">
          <div>
            <p class="section-label">失效条件</p>
            <h2>今日风险</h2>
          </div>
        </div>
        <ul class="risk-notes" id="riskNotes"></ul>
      </section>

      <section class="band">
        <div class="section-head">
          <div>
            <p class="section-label">理解框架</p>
            <h2>需要理解的市场逻辑</h2>
          </div>
        </div>
        <div class="learning-list" id="learningList"></div>
      </section>
    </section>

  </main>

  <script src="./report-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
